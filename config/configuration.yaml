# Minimal Home Assistant config for developing/testing the Homex integration.
default_config:

# Native, user-editable scenes. Homex seeds its scenes here; you can then edit
# them in Settings -> Automations & scenes -> Scenes.
scene: !include scenes.yaml

# --- Fake devices so you have something to wire into Homex rooms ---
# input_boolean helpers behave as generic on/off entities (treated as
# "lamps / switches" by Homex, and usable as triggers too).
input_boolean:
  lamp_living_1:
    name: Living Room Lamp 1
    icon: mdi:lightbulb
  lamp_living_2:
    name: Living Room Lamp 2
    icon: mdi:lightbulb
  lamp_bedroom_1:
    name: Bedroom Lamp 1
    icon: mdi:lightbulb
  lamp_bedroom_2:
    name: Bedroom Lamp 2
    icon: mdi:lightbulb
  wall_switch_bedroom:
    name: Bedroom Wall Switch (trigger)
    icon: mdi:light-switch
  motion_bedroom:
    name: Bedroom Motion (trigger)
    icon: mdi:motion-sensor

logger:
  default: info
  logs:
    custom_components.homex: debug
